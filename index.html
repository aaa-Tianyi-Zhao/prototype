<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tandanya Collection Search Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="header">
        <h1>
            <span id="header-icon" aria-hidden="true">🏺</span> 
            Tandanya Cultural Collection
        </h1>
        <p>Preserving Indigenous heritage through smart collection management</p>
    </header>

    <main>
        <section class="search-section" aria-label="Search and Filter">
            <div class="search-box">
                <div class="search-input-group">
                    <label for="searchInput">
                        <span aria-hidden="true">🔍</span> Search
                    </label>
                    <input type="search" id="searchInput" placeholder="Search by ID, artist name, location, or material...">
                </div>

                <div class="filter-group">
                    <label for="typeFilter">
                        <span aria-hidden="true">📂</span> Filter by Type
                    </label>
                    <select id="typeFilter">
                        <option value="all">All Types</option>
                        <option value="painting">Painting</option>
                        <option value="carving">Carving</option>
                        <option value="weapon">Weapon</option>
                        <option value="ceremony">Ceremonial Item</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="button" class="search-btn" id="searchBtn">
                        <span aria-hidden="true">🔎</span> Search
                    </button>
                    <button type="button" class="reset-btn" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="results-header">
                <div class="results-count" id="resultsCount" aria-live="polite">Showing all items</div>
                <div class="performance-note">⚡ Results in under 2 seconds | 🔤 Case insensitive</div>
            </div>
        </section>

        <section class="results-section" aria-label="Search Results">
            <div class="card-grid" id="cardGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <p>© Tandanya Cultural Collection | Protecting cultural knowledge through technology</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
